<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TransitOps Login</title>
  <style>
    :root { --bg:#07111f; --panel:#0f172a; --panel-2:#111c31; --accent:#38bdf8; --accent-2:#818cf8; --text:#f8fafc; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { font-family: Inter, Arial, sans-serif; margin:0; min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg, var(--bg), #14213d); color:var(--text); }
    .card { width:min(92vw, 460px); background:rgba(15,23,42,0.95); border:1px solid rgba(255,255,255,0.08); padding:2rem; border-radius:24px; box-shadow:0 24px 70px rgba(2,6,23,0.45); }
    h2 { margin:0 0 0.35rem; font-size:1.9rem; }
    .subtitle { color:var(--muted); margin-bottom:1.2rem; }
    form { display:flex; flex-direction:column; gap:0.8rem; }
    input, select, button { width:100%; padding:0.9rem 1rem; border-radius:12px; border:none; font-size:1rem; }
    input, select { background:#e2e8f0; color:#0f172a; }
    button { background:linear-gradient(90deg, var(--accent), var(--accent-2)); color:white; font-weight:700; cursor:pointer; }
    .pill { display:inline-block; margin-top:0.8rem; padding:0.35rem 0.65rem; border-radius:999px; background:rgba(56,189,248,0.15); color:#7dd3fc; font-size:0.8rem; }
    .error-box { border: 2px dashed #ff9aa2; background: rgba(139, 0, 0, 0.08); color: #ffd6d9; padding: 1rem; border-radius: 14px; margin-bottom: 1rem; }
    .error-box strong { display:inline-block; margin-right:0.6rem; color:#ff6b7a; }
    .error-lines { color:#ffd6d9; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>TransitOps</h2>
    <p class="subtitle">Secure transport operations portal</p>
    {% if error %}
      <div class="error-box" role="alert">
        <div style="display:flex; align-items:center; gap:0.6rem;">
          <strong>✖ Error state</strong>
          <div style="flex:1; font-size:0.95rem; color:#ffd6d9;">Please review the issues below.</div>
        </div>
        <div style="margin-top:0.6rem;">
          {% for line in error.split('\n') %}
            <p class="error-lines">{{ line }}</p>
          {% endfor %}
        </div>
      </div>
    {% endif %}
    <form method="post">
      <input name="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <select name="role" required>
        <option value="Fleet Manager">Fleet Manager</option>
        <option value="Safety Officer">Safety Officer</option>
        <option value="Driver">Driver</option>
        <option value="Financial Analyst">Financial Analyst</option>
      </select>
      <button type="submit">Login</button>
    </form>
    <span class="pill">Role-aware fleet control</span>
  </div>
</body>
</html>
