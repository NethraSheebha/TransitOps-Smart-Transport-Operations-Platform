<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TransitOps Login</title>
  <style>
    :root { --bg:#07111f; --panel:#0f172a; --panel-2:#111c31; --accent:#38bdf8; --accent-2:#818cf8; --text:#010306; --muted:#94a3b8; --danger:#ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg, var(--bg), #14213d); color:var(--text); }
    .card { width:min(92vw, 460px); background:rgba(15,23,42,0.95); border:1px solid rgba(255,255,255,0.1); padding:2.5rem; border-radius:28px; box-shadow:0 24px 70px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.1); backdrop-filter: blur(16px); animation: slideUp 0.6s ease-out; }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    h2 { margin:0 0 0.5rem; font-size:2rem; font-weight:800; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color:var(--muted); margin-bottom:1.8rem; font-size:0.95rem; }
    form { display:flex; flex-direction:column; gap:1rem; }
    .form-group { display:flex; flex-direction:column; gap:0.35rem; }
    .form-group label { font-size:0.85rem; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
    input, select { width:100%; padding:1rem 1.1rem; border-radius:14px; border:1px solid rgba(148,163,184,0.25); background:rgba(248,250,252,0.08); color:var(--text); font-size:1rem; transition: all 0.3s ease; }
    input:hover, select:hover { border-color:rgba(56,189,248,0.5); background:rgba(248,250,252,0.12); }
    input:focus, select:focus { outline:none; border-color:var(--accent); background:rgba(248,250,252,0.15); box-shadow:0 0 0 3px rgba(56,189,248,0.1); }
    button { width:100%; padding:1.1rem 1.2rem; border-radius:14px; border:none; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:white; font-weight:700; font-size:1rem; cursor:pointer; transition: all 0.3s ease; margin-top:0.5rem; }
    button:hover { transform: translateY(-2px); box-shadow:0 12px 30px rgba(56,189,248,0.3); }
    button:active { transform: translateY(0); }
    .error { padding:1rem; border-radius:12px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; font-size:0.9rem; text-align:center; margin-bottom:1rem; }
    .pill { display:inline-block; margin-top:1rem; padding:0.45rem 0.85rem; border-radius:999px; background:rgba(56,189,248,0.15); color:#7dd3fc; font-size:0.8rem; font-weight:600; }
    @media (max-width: 640px) { .card { padding:1.8rem; } h2 { font-size:1.6rem; } }
  </style>
</head>
<body>
  <div class="card">
    <h2>TransitOps</h2>
    <p class="subtitle">Smart transport operations platform</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label>Email Address</label>
        <input name="email" type="email" placeholder="name@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="••••••••" required />
      </div>
      <div class="form-group">
        <label>User Role</label>
        <select name="role" required>
          <option value="">Select your role...</option>
          <option value="Fleet Manager">Fleet Manager</option>
          <option value="Safety Officer">Safety Officer</option>
          <option value="Driver">Driver</option>
          <option value="Financial Analyst">Financial Analyst</option>
        </select>
      </div>
      <button type="submit">Sign In</button>
    </form>
    <span class="pill">🔒 Secure role-based access</span>
  </div>
</body>
</html>
